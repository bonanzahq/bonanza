# ABOUTME: Production Docker Compose configuration for Bonanza.
# ABOUTME: Development overrides are in docker-compose.override.yml (auto-merged).

services:
  db:
    image: postgres:17.7
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bonanza_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.4.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - bonanza_elasticsearch_data:/usr/share/elasticsearch/data
      - ./elastic_synonyms.txt:/usr/share/elasticsearch/config/elastic_synonyms.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  rails:
    build: .
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/bonanza_redux_production
      ELASTICSEARCH_URL: http://elasticsearch:9200
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT:-443}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  caddy:
    image: caddy:2.10.2
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_ADDRESS: ${APP_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - bonanza_caddy_data:/data
    depends_on:
      - rails

volumes:
  bonanza_postgres_data:
  bonanza_elasticsearch_data:
  bonanza_caddy_data:
