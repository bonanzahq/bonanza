# ABOUTME: Production Docker Compose configuration for Bonanza.
# ABOUTME: Development overrides are in docker-compose.override.yml (auto-merged).

services:
  db:
    image: postgres:17.7
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - bonanza_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  elasticsearch:
    image: elasticsearch:8.4.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - bonanza_elasticsearch_data:/usr/share/elasticsearch/data
      - ./elastic_synonyms.txt:/usr/share/elasticsearch/config/elastic_synonyms.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  rails:
    image: bonanzahq/bonanza:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-}
      DB_NAME: bonanza_redux_production
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      ES_PASSWORD: ${ELASTIC_PASSWORD:-}
      APP_HOST: ${APP_HOST:-}
      APP_PORT: ${APP_PORT:-443}
      APP_PROTOCOL: ${APP_PROTOCOL:-https}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAILER_FROM: ${MAILER_FROM:-}
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2.10.2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CADDY_ADDRESS: ${CADDY_ADDRESS:-:8080}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - bonanza_caddy_data:/data
    depends_on:
      - rails
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  bonanza_postgres_data:
  bonanza_elasticsearch_data:
  bonanza_caddy_data:
