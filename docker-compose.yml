# ABOUTME: Orchestrates all services for the Bonanza development environment.
# ABOUTME: Runs Rails, PostgreSQL, Elasticsearch, Caddy reverse proxy, and Mailpit.

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.4.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elastic_synonyms.txt:/usr/share/elasticsearch/config/elastic_synonyms.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  rails:
    build: .
    env_file: .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/bonanza_redux_development
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - rails_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - rails

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"

volumes:
  postgres_data:
  elasticsearch_data:
  caddy_data:
  node_modules:
  rails_storage:
