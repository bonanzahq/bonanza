# ABOUTME: nginx site config for production. Terminates TLS and proxies to Caddy.
# ABOUTME: Install to /etc/nginx/sites-enabled/default on the production server.

server {
    listen 443 ssl;
    server_name bonanza.fh-potsdam.de;

    ssl_certificate /etc/letsencrypt/live/bonanza.fh-potsdam.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bonanza.fh-potsdam.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_log /var/log/nginx/bonanza_error.log;
    access_log /var/log/nginx/bonanza_access.log;
}
