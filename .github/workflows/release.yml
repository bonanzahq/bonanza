# ABOUTME: Runs semantic-release on main and beta branches to create versioned releases.
# ABOUTME: Analyzes conventional commits, generates changelogs, and pushes git tags.

name: Release

on:
  push:
    branches: [main, beta, alpha]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/renovate.json'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A PAT is required so the tag push triggers the Docker Build workflow.
          # GITHUB_TOKEN events don't trigger downstream workflows.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install mise
        uses: jdx/mise-action@v2

      - run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
