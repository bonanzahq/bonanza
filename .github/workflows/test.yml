name: Test

on:
  pull_request:
    branches: [main, beta]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/renovate.json'
  push:
    branches: [main, beta]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/renovate.json'

jobs:
  test:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      TEST_DATABASE_HOST: localhost
      TEST_DATABASE_USER: postgres
      TEST_DATABASE_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: false

      - name: Install toolchain
        run: mise install ruby@4.0.1 node@24 lefthook@2.1.4

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate

      - name: Install Ruby dependencies
        run: mise exec -- bundle install

      - name: Install JS dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build assets
        run: mise exec -- pnpm build && mise exec -- pnpm build:css

      - name: Run JavaScript tests
        run: mise exec -- node test/javascript/datepicker_duration_test.mjs

      - name: Setup database
        run: mise exec -- bundle exec rails db:create db:schema:load

      - name: Run tests
        run: mise exec -- bundle exec rails test
