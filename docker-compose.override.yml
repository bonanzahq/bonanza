# ABOUTME: Development overrides for Docker Compose.
# ABOUTME: Auto-merged with docker-compose.yml when running `docker compose up`.

services:
  db:
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  elasticsearch:
    environment:
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"

  rails:
    build: .
    user: root
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/bonanza_redux_development
      ELASTICSEARCH_URL: http://elasticsearch:9200
      APP_HOST: localhost
      APP_PORT: 8080
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      RAILS_MASTER_KEY: ""
      RAILS_SERVE_STATIC_FILES: ""
      RAILS_LOG_TO_STDOUT: ""
      SECRET_KEY_BASE: dev-not-secret
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bonanza_node_modules:/app/node_modules
      - bonanza_rails_storage:/app/storage
    command: ["foreman", "start", "-f", "Procfile.dev"]

  caddy:
    ports:
      - "8080:8080"
    environment:
      CADDY_ADDRESS: ":8080"

  mailpit:
    image: axllent/mailpit:v1.29.0
    restart: unless-stopped
    ports:
      - "8025:8025"

  dozzle:
    image: amir20/dozzle:v10.0.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"

volumes:
  bonanza_node_modules:
  bonanza_rails_storage:
