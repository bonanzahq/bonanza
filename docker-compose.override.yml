# ABOUTME: Development overrides for Docker Compose.
# ABOUTME: Auto-merged with docker-compose.yml when running `docker compose up`.

services:
  db:
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  elasticsearch:
    environment:
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"

  rails:
    build: .
    user: root
    environment:
      RAILS_ENV: development
      DEV_DATABASE_HOST: db
      DEV_DATABASE_PORT: "5432"
      DEV_DATABASE_USER: postgres
      DEV_DATABASE_PASSWORD: password
      DEV_DATABASE_NAME: bonanza_redux_development
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      APP_HOST: localhost
      APP_PORT: 8080
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      RAILS_SERVE_STATIC_FILES: ""
      RAILS_LOG_TO_STDOUT: ""
      SECRET_KEY_BASE: dev-not-secret
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bonanza_node_modules:/app/node_modules
      - bonanza_rails_storage:/app/storage
    command: ["foreman", "start", "-f", "Procfile.dev"]

  caddy:
    ports:
      - "8080:8080"
    environment:
      CADDY_ADDRESS: ":8080"

  worker:
    build: .
    user: root
    environment:
      RAILS_ENV: development
      DEV_DATABASE_HOST: db
      DEV_DATABASE_PORT: "5432"
      DEV_DATABASE_USER: postgres
      DEV_DATABASE_PASSWORD: password
      DEV_DATABASE_NAME: bonanza_redux_development
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      APP_HOST: localhost
      APP_PORT: 8080
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SECRET_KEY_BASE: dev-not-secret
      RAILS_MAX_THREADS: "15"
      SKIP_REINDEX: "true"
    volumes:
      - .:/app
      - bonanza_node_modules:/app/node_modules
    command: ["bundle", "exec", "rake", "solid_queue:start"]

  mailpit:
    image: axllent/mailpit:v1.29.0
    restart: unless-stopped
    ports:
      - "8025:8025"

  dozzle:
    image: amir20/dozzle:v10.0.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"

volumes:
  bonanza_node_modules:
  bonanza_rails_storage:
