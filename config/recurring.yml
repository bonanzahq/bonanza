# ABOUTME: Solid Queue recurring task schedule.
# ABOUTME: Defines automated daily jobs for notifications, cleanup, and maintenance.

production:
  send_overdue_notifications:
    class: SendOverdueNotificationsJob
    schedule: every day at 7:30pm Europe/Berlin
  send_upcoming_return_reminders:
    class: SendUpcomingReturnRemindersJob
    schedule: every day at 6pm Europe/Berlin
  send_staffed_department_notifications:
    class: SendStaffedDepartmentNotificationsJob
    schedule: every day at 6:45pm Europe/Berlin
  send_staff_daily_returns:
    class: SendStaffDailyReturnsJob
    schedule: every day at 7:30am Europe/Berlin
  cleanup_expired_conducts:
    class: CleanupExpiredConductsJob
    schedule: every day at 8pm Europe/Berlin
  cleanup_abandoned_carts:
    class: CleanupAbandonedCartsJob
    schedule: every day at 11:30pm Europe/Berlin
  gdpr_anonymize_inactive_borrowers:
    class: GdprAnonymizeInactiveBorrowersJob
    schedule: every Sunday at 3am Europe/Berlin
  gdpr_anonymize_old_borrowers:
    class: GdprAnonymizeOldBorrowersJob
    schedule: every Sunday at 3:15am Europe/Berlin
  gdpr_cleanup_old_conducts:
    class: GdprCleanupOldConductsJob
    schedule: every Sunday at 3:30am Europe/Berlin

