# All environments use env vars with sensible defaults so any environment
# can be pointed at any Postgres instance.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DEV_DATABASE_NAME", "bonanza_redux_development") %>
  host: <%= ENV.fetch("DEV_DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DEV_DATABASE_PORT", "5432") %>
  username: <%= ENV.fetch("DEV_DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DEV_DATABASE_PASSWORD", "postgres") %>

test:
  <<: *default
  database: <%= ENV.fetch("TEST_DATABASE_NAME", "bonanza_redux_test") %>
  host: <%= ENV.fetch("TEST_DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("TEST_DATABASE_PORT", "5432") %>
  username: <%= ENV.fetch("TEST_DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("TEST_DATABASE_PASSWORD", "postgres") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "bonanza_redux_production") %>
  host: <%= ENV.fetch("DB_HOST", "db") %>
  port: <%= ENV.fetch("DB_PORT", "5432") %>
  username: <%= ENV.fetch("DB_USER", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
